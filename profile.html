<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Profile</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  <!-- 🔹 Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#">MyPortfolio</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="profile.html">Profile</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 🔸 Profile Section -->
  <section class="profile-section py-5">
    <div class="container">
      <h1 class="text-center mb-4">My Profile</h1>

      <!-- Key Details -->
      <div class="mb-4">
        <h2>Pooja M</h2>
        <p>Frontend Developer with a love for clean design, user experience, and responsive web development.</p>
      </div>

      <!-- Strengths & Skills -->
      <h3 class="mb-3">My Strengths</h3>
      <div class="mb-3">
        <label>HTML</label>
        <div class="progress">
          <div class="progress-bar bg-success" role="progressbar" style="width: 0%" data-value="95">0%</div>
        </div>
      </div>
      <div class="mb-3">
        <label>CSS</label>
        <div class="progress">
          <div class="progress-bar bg-info" role="progressbar" style="width: 0%" data-value="90">0%</div>
        </div>
      </div>
      <div class="mb-3">
        <label>JavaScript</label>
        <div class="progress">
          <div class="progress-bar bg-warning" role="progressbar" style="width: 0%" data-value="85">0%</div>
        </div>
      </div>
      <div class="mb-3">
        <label>Bootstrap</label>
        <div class="progress">
          <div class="progress-bar bg-primary" role="progressbar" style="width: 0%" data-value="80">0%</div>
        </div>
      </div>

      <!-- Download Button -->
      <div class="text-center mt-4">
        <a href="resume.pdf" download class="btn btn-outline-dark btn-lg">Download My Resume</a>
      </div>
    </div>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
